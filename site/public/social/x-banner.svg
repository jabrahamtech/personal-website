<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="X profile banner: jonathan_abraham.os terminal-style identity on the left, with a stylised silhouette of Sigiriya rock on the right and a green path of dots ascending to a summit flag.">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#070a08"/>
      <stop offset="100%" stop-color="#0b0e0c"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#152017" stroke-width="1"/>
    </pattern>
    <linearGradient id="rockFace" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a2421"/>
      <stop offset="55%" stop-color="#22302a"/>
      <stop offset="100%" stop-color="#0c110e"/>
    </linearGradient>
    <linearGradient id="rockGlow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5b860" stop-opacity="0"/>
      <stop offset="55%" stop-color="#f5b860" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5b860" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sky" cx="0.7" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#1a2b1d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#070a08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#sky)"/>
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.55"/>

  <!-- horizon line -->
  <line x1="0" y1="430" x2="1500" y2="430" stroke="#1a2b1d" stroke-width="1" stroke-dasharray="2,6"/>

  <!-- distant ridges (water gardens / surrounding plain) -->
  <g fill="#0e1612" opacity="0.85">
    <path d="M 0 432 Q 200 412 400 426 Q 600 440 800 422 Q 1000 410 1200 428 Q 1350 438 1500 422 L 1500 500 L 0 500 Z"/>
  </g>

  <!-- Sigiriya rock silhouette (right-of-centre).
       Wide steep base, gentle outward curve, narrowing to a flat-ish summit dome. -->
  <g>
    <path d="
      M 880 430
      Q 882 350 905 260
      Q 925 170 985 115
      Q 1080 78 1200 80
      Q 1320 82 1395 130
      Q 1455 175 1470 260
      Q 1485 350 1488 430
      L 1500 430
      L 1500 432
      L 880 432
      Z
    " fill="url(#rockFace)" stroke="#46c463" stroke-width="1.2"/>

    <!-- amber fresco band hint -->
    <path d="
      M 905 220
      Q 990 175 1200 168
      Q 1395 175 1470 230
      L 1470 295
      Q 1395 270 1200 264
      Q 990 270 905 295
      Z
    " fill="url(#rockGlow)"/>

    <!-- horizontal strata lines on the rock -->
    <g stroke="#1d2820" stroke-width="0.8" fill="none" opacity="0.85">
      <path d="M 895 270 Q 1180 256 1480 270"/>
      <path d="M 888 320 Q 1180 308 1485 320"/>
      <path d="M 884 365 Q 1180 354 1488 365"/>
      <path d="M 882 400 Q 1180 392 1490 400"/>
    </g>

    <!-- subtle vertical fissures -->
    <g stroke="#0a0e0b" stroke-width="0.6" fill="none" opacity="0.7">
      <path d="M 980 130 L 990 420"/>
      <path d="M 1100 100 L 1110 420"/>
      <path d="M 1220 95 L 1228 420"/>
      <path d="M 1340 110 L 1346 420"/>
    </g>
  </g>

  <!-- water gardens at the base — Sigiriya's iconic moats, drawn as
       calm horizontal ripples in front of the rock. -->
  <g stroke="#46c463" stroke-width="0.7" fill="none" opacity="0.35">
    <path d="M 700 444 Q 850 442 1000 444 T 1300 444 T 1500 444"/>
    <path d="M 720 451 Q 870 449 1020 451 T 1320 451 T 1500 451"/>
    <path d="M 740 458 Q 890 456 1040 458 T 1340 458 T 1500 458"/>
  </g>

  <!-- palm tree silhouettes flanking the rock base -->
  <g fill="#46c463" opacity="0.7">
    <!-- left palm -->
    <g transform="translate(795, 430)">
      <line x1="0" y1="0" x2="0" y2="-46" stroke="#46c463" stroke-width="2"/>
      <path d="M 0 -46 Q -16 -56 -28 -50"/>
      <path d="M 0 -46 Q 16 -56 28 -50"/>
      <path d="M 0 -46 Q -10 -62 -20 -64"/>
      <path d="M 0 -46 Q 10 -62 20 -64"/>
      <path d="M 0 -46 Q -2 -64 0 -68"/>
    </g>
    <!-- right palm -->
    <g transform="translate(1408, 430)">
      <line x1="0" y1="0" x2="0" y2="-40" stroke="#46c463" stroke-width="2"/>
      <path d="M 0 -40 Q -14 -50 -24 -44"/>
      <path d="M 0 -40 Q 14 -50 24 -44"/>
      <path d="M 0 -40 Q -8 -56 -18 -58"/>
      <path d="M 0 -40 Q 8 -56 18 -58"/>
    </g>
  </g>

  <!-- lion paws at the base, marking the gate entrance -->
  <g fill="#46c463" opacity="0.9">
    <!-- left paw -->
    <g transform="translate(900,420)">
      <ellipse cx="14" cy="10" rx="13" ry="9"/>
      <ellipse cx="2" cy="-3" rx="3.2" ry="4.2"/>
      <ellipse cx="9" cy="-7" rx="3.2" ry="4.2"/>
      <ellipse cx="18" cy="-7" rx="3.2" ry="4.2"/>
      <ellipse cx="26" cy="-3" rx="3.2" ry="4.2"/>
    </g>
    <!-- right paw -->
    <g transform="translate(1320,420)">
      <ellipse cx="-14" cy="10" rx="13" ry="9"/>
      <ellipse cx="-2" cy="-3" rx="3.2" ry="4.2"/>
      <ellipse cx="-9" cy="-7" rx="3.2" ry="4.2"/>
      <ellipse cx="-18" cy="-7" rx="3.2" ry="4.2"/>
      <ellipse cx="-26" cy="-3" rx="3.2" ry="4.2"/>
    </g>
    <text x="1110" y="455" font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace" font-size="9" fill="#46c463" letter-spacing="3" text-anchor="middle">LION GATE</text>
  </g>

  <!-- distant stars / dots in the sky -->
  <g fill="#46c463" opacity="0.55">
    <circle cx="1380" cy="80" r="1.5"/>
    <circle cx="1410" cy="125" r="1.2"/>
    <circle cx="1340" cy="155" r="1.2"/>
    <circle cx="1450" cy="60" r="1.2"/>
    <circle cx="780" cy="105" r="1.5"/>
    <circle cx="720" cy="160" r="1.2"/>
  </g>

  <!-- left-side identity block — terminal flourishes only, no bio -->
  <g transform="translate(72,118)" font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace" fill="#cfe9d3">
    <!-- top eyebrow -->
    <g fill="#7dff8a">
      <rect x="0" y="-12" width="11" height="11"/>
      <rect x="18" y="-12" width="11" height="11"/>
      <rect x="36" y="-12" width="11" height="11"/>
    </g>
    <text x="58" y="-2" font-size="13" fill="#9aa39a" letter-spacing="3">OPERATOR://NOTES</text>

    <!-- prompt -->
    <text x="0" y="38" font-size="14" fill="#7dff8a" letter-spacing="3">&gt; whoami</text>

    <!-- big name -->
    <text x="-2" y="118" font-size="64" font-weight="700" fill="#ecebe4" letter-spacing="-1">jonathan_abraham<tspan fill="#7dff8a">.os</tspan></text>

    <!-- origin badge — Sri Lanka country code, with a steady green pip -->
    <g transform="translate(0, 168)" font-size="11.5" letter-spacing="2.5">
      <rect x="0" y="-15" width="62" height="22" fill="none" stroke="#7dff8a"/>
      <rect x="9" y="-9" width="6" height="6" fill="#7dff8a"/>
      <text x="22" y="0" fill="#7dff8a">[LK]</text>
    </g>
  </g>

  <!-- bottom heritage strip: Sigiriya's coordinates + place name + URL -->
  <g transform="translate(360, 472)" font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace" font-size="11" fill="#5a6d5d">
    <text letter-spacing="2.5">▸ 7°57'27"N 80°45'34"E  ·  ▸ lion rock, central province  ·  ▸ sri lanka</text>
  </g>
  <g transform="translate(1428, 472)" font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace" font-size="11" fill="#7dff8a" text-anchor="end">
    <text letter-spacing="2.5">jabrahamtech.com →</text>
  </g>
</svg>
