<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <filter id="wobble" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
    </filter>
    <filter id="wobble-soft" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
    </filter>
    <marker id="arrow-ink" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#3E2A1E"/>
    </marker>
    <marker id="arrow-rust" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#A14A2A"/>
    </marker>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .h    { font-family: 'Caveat', cursive; font-weight: 700; }
      .lbl  { font-family: 'Caveat', cursive; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
    </style>
  </defs>

  <!-- Cream paper -->
  <rect width="1600" height="900" fill="#F5E9D7"/>

  <!-- Notebook ruled lines -->
  <g stroke="#D4A14A" stroke-width="1" opacity="0.16">
    <line x1="0" y1="28"  x2="1600" y2="28"/><line x1="0" y1="56"  x2="1600" y2="56"/>
    <line x1="0" y1="84"  x2="1600" y2="84"/><line x1="0" y1="112" x2="1600" y2="112"/>
    <line x1="0" y1="140" x2="1600" y2="140"/><line x1="0" y1="168" x2="1600" y2="168"/>
    <line x1="0" y1="196" x2="1600" y2="196"/><line x1="0" y1="224" x2="1600" y2="224"/>
    <line x1="0" y1="252" x2="1600" y2="252"/><line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="308" x2="1600" y2="308"/><line x1="0" y1="336" x2="1600" y2="336"/>
    <line x1="0" y1="364" x2="1600" y2="364"/><line x1="0" y1="392" x2="1600" y2="392"/>
    <line x1="0" y1="420" x2="1600" y2="420"/><line x1="0" y1="448" x2="1600" y2="448"/>
    <line x1="0" y1="476" x2="1600" y2="476"/><line x1="0" y1="504" x2="1600" y2="504"/>
    <line x1="0" y1="532" x2="1600" y2="532"/><line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="588" x2="1600" y2="588"/><line x1="0" y1="616" x2="1600" y2="616"/>
    <line x1="0" y1="644" x2="1600" y2="644"/><line x1="0" y1="672" x2="1600" y2="672"/>
    <line x1="0" y1="700" x2="1600" y2="700"/><line x1="0" y1="728" x2="1600" y2="728"/>
    <line x1="0" y1="756" x2="1600" y2="756"/><line x1="0" y1="784" x2="1600" y2="784"/>
    <line x1="0" y1="812" x2="1600" y2="812"/><line x1="0" y1="840" x2="1600" y2="840"/>
    <line x1="0" y1="868" x2="1600" y2="868"/>
  </g>

  <!-- Vertical margin line -->
  <line x1="80" y1="0" x2="80" y2="900" stroke="#A14A2A" stroke-width="1.5" opacity="0.45"/>

  <!-- TITLE (two lines, handwritten) -->
  <text x="135" y="400" class="h" font-size="92" fill="#3E2A1E">Most ‘human-in-the-loop’</text>
  <text x="135" y="500" class="h" font-size="92" fill="#3E2A1E">is escalation done badly</text>

  <!-- CAPTION -->
  <text x="138" y="560" class="mono" font-size="20" fill="#3E2A1E" opacity="0.75">notes on systems, AI, and the craft of building software</text>

  <!-- Small underline mark under "escalation" -->
  <path d="M 535 522 Q 740 530 940 521" stroke="#A14A2A" stroke-width="2.5" fill="none" opacity="0.7" filter="url(#wobble-soft)"/>

  <!-- VIGNETTE upper-right: 3-node loop with human bottleneck -->
  <g transform="translate(1180, 130)">
    <!-- Faint hand-drawn vignette frame -->
    <path d="M 0 0 L 310 0 L 310 280 L 0 280 Z" stroke="#3E2A1E" stroke-width="1.2" fill="none" opacity="0.28" stroke-dasharray="6 5" filter="url(#wobble-soft)"/>

    <!-- AI task node 1 (top-left of triangle) -->
    <circle cx="85" cy="70" r="34" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="85" y="64" class="lbl" font-size="18" fill="#3E2A1E" text-anchor="middle">AI</text>
    <text x="85" y="84" class="lbl" font-size="14" fill="#3E2A1E" text-anchor="middle" opacity="0.7">step</text>

    <!-- HUMAN bottleneck node (right, deep-rust filled, narrow) -->
    <ellipse cx="235" cy="140" rx="22" ry="42" fill="#A14A2A" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="235" y="146" class="lbl" font-size="14" fill="#F5E9D7" text-anchor="middle">human</text>

    <!-- AI task node 2 (bottom-left) -->
    <circle cx="85" cy="210" r="34" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="85" y="204" class="lbl" font-size="18" fill="#3E2A1E" text-anchor="middle">AI</text>
    <text x="85" y="224" class="lbl" font-size="14" fill="#3E2A1E" text-anchor="middle" opacity="0.7">step</text>

    <!-- Loop arrows: top -> human -->
    <path d="M 115 80 Q 175 75 215 110" stroke="#3E2A1E" stroke-width="2.5" fill="none" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <!-- human -> bottom -->
    <path d="M 215 170 Q 175 215 117 218" stroke="#3E2A1E" stroke-width="2.5" fill="none" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <!-- bottom back to top (long curve on the left) -->
    <path d="M 51 210 Q 15 140 51 75" stroke="#3E2A1E" stroke-width="2.5" fill="none" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>

    <!-- Vignette caption -->
    <text x="155" y="270" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">the loop everyone draws</text>
  </g>

  <!-- NIB in left margin pointing at title -->
  <g transform="translate(38, 432)">
    <!-- Nib body teardrop pointing down -->
    <path d="M 0 30 L -15 9 L -15 -14 Q -15 -23 0 -23 Q 15 -23 15 -14 L 15 9 Z"
          fill="#F5E9D7" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
    <!-- Breather hole -->
    <circle cx="0" cy="3" r="2" fill="#3E2A1E"/>
    <!-- Slit -->
    <line x1="0" y1="5" x2="0" y2="28" stroke="#3E2A1E" stroke-width="1.5"/>
    <!-- Eyes (looking right toward the title) -->
    <circle cx="-3" cy="-11" r="1.8" fill="#3E2A1E"/>
    <circle cx="7" cy="-11" r="1.8" fill="#3E2A1E"/>
  </g>
  <!-- Wobbly arrow from Nib to title -->
  <path d="M 60 410 Q 85 405 115 408" stroke="#3E2A1E" stroke-width="1.8" fill="none" opacity="0.7" marker-end="url(#arrow-ink)" filter="url(#wobble-soft)"/>

  <!-- Small monospace byline lower right -->
  <text x="1500" y="858" class="mono" font-size="13" fill="#3E2A1E" opacity="0.55" text-anchor="end">jonathan · 2026-05-13</text>
</svg>
