<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <filter id="wobble" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
    </filter>
    <filter id="wobble-soft" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
    </filter>

    <marker id="arrow-ink" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#3E2A1E"/>
    </marker>
    <marker id="arrow-rust" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#A14A2A"/>
    </marker>

    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .h    { font-family: 'Caveat', cursive; font-weight: 600; }
      .lbl  { font-family: 'Caveat', cursive; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
    </style>
  </defs>

  <!-- Cream paper background -->
  <rect width="1600" height="900" fill="#F5E9D7"/>

  <!-- Notebook ruled lines -->
  <g stroke="#D4A14A" stroke-width="1" opacity="0.16">
    <line x1="0" y1="28"  x2="1600" y2="28"/><line x1="0" y1="56"  x2="1600" y2="56"/>
    <line x1="0" y1="84"  x2="1600" y2="84"/><line x1="0" y1="112" x2="1600" y2="112"/>
    <line x1="0" y1="140" x2="1600" y2="140"/><line x1="0" y1="168" x2="1600" y2="168"/>
    <line x1="0" y1="196" x2="1600" y2="196"/><line x1="0" y1="224" x2="1600" y2="224"/>
    <line x1="0" y1="252" x2="1600" y2="252"/><line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="308" x2="1600" y2="308"/><line x1="0" y1="336" x2="1600" y2="336"/>
    <line x1="0" y1="364" x2="1600" y2="364"/><line x1="0" y1="392" x2="1600" y2="392"/>
    <line x1="0" y1="420" x2="1600" y2="420"/><line x1="0" y1="448" x2="1600" y2="448"/>
    <line x1="0" y1="476" x2="1600" y2="476"/><line x1="0" y1="504" x2="1600" y2="504"/>
    <line x1="0" y1="532" x2="1600" y2="532"/><line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="588" x2="1600" y2="588"/><line x1="0" y1="616" x2="1600" y2="616"/>
    <line x1="0" y1="644" x2="1600" y2="644"/><line x1="0" y1="672" x2="1600" y2="672"/>
    <line x1="0" y1="700" x2="1600" y2="700"/><line x1="0" y1="728" x2="1600" y2="728"/>
    <line x1="0" y1="756" x2="1600" y2="756"/><line x1="0" y1="784" x2="1600" y2="784"/>
    <line x1="0" y1="812" x2="1600" y2="812"/><line x1="0" y1="840" x2="1600" y2="840"/>
    <line x1="0" y1="868" x2="1600" y2="868"/>
  </g>

  <!-- Vertical margin line -->
  <line x1="80" y1="0" x2="80" y2="900" stroke="#A14A2A" stroke-width="1.5" opacity="0.45"/>

  <!-- Panel dividers -->
  <line x1="570" y1="130" x2="570" y2="760" stroke="#3E2A1E" stroke-width="1" opacity="0.28" filter="url(#wobble-soft)"/>
  <line x1="1050" y1="130" x2="1050" y2="760" stroke="#3E2A1E" stroke-width="1" opacity="0.28" filter="url(#wobble-soft)"/>

  <!-- ============ PANEL 1: HITL ============ -->
  <g>
    <!-- Title + descriptor -->
    <text x="330" y="200" class="h" font-size="64" fill="#3E2A1E" text-anchor="middle">HITL</text>
    <text x="330" y="245" class="mono" font-size="16" fill="#3E2A1E" text-anchor="middle">human gates every step</text>

    <!-- AI flow bracket label -->
    <text x="330" y="395" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">AI flow</text>
    <path d="M 145 412 Q 145 422 155 422 L 505 422 Q 515 422 515 412" stroke="#3E2A1E" stroke-width="1.5" fill="none" opacity="0.55" filter="url(#wobble-soft)"/>

    <!-- Task → human → task → human → task -->
    <!-- Task 1 -->
    <rect x="145" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="175" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>
    <!-- Arrow 1 -->
    <line x1="205" y1="485" x2="225" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <!-- Human gate 1 -->
    <circle cx="252" cy="485" r="24" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="252" y="491" class="lbl" font-size="14" fill="#3E2A1E" text-anchor="middle">human</text>
    <!-- Arrow 2 -->
    <line x1="278" y1="485" x2="298" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <!-- Task 2 -->
    <rect x="300" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="330" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>
    <!-- Arrow 3 -->
    <line x1="360" y1="485" x2="380" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <!-- Human gate 2 -->
    <circle cx="407" cy="485" r="24" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="407" y="491" class="lbl" font-size="14" fill="#3E2A1E" text-anchor="middle">human</text>
    <!-- Arrow 4 -->
    <line x1="433" y1="485" x2="453" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <!-- Task 3 -->
    <rect x="455" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="485" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>

    <!-- Inline note -->
    <text x="330" y="570" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">flow routes through a human at every step</text>
  </g>

  <!-- ============ PANEL 2: HOTL ============ -->
  <g>
    <text x="810" y="200" class="h" font-size="64" fill="#3E2A1E" text-anchor="middle">HOTL</text>
    <text x="810" y="245" class="mono" font-size="16" fill="#3E2A1E" text-anchor="middle">human observes from above</text>

    <!-- Human floating above, olive border -->
    <circle cx="810" cy="360" r="42" fill="#E8D6B8" stroke="#7A8450" stroke-width="2.8" filter="url(#wobble)"/>
    <text x="810" y="368" class="lbl" font-size="22" fill="#3E2A1E" text-anchor="middle">human</text>

    <!-- Dashed observation lines down to each task -->
    <line x1="675" y1="405" x2="675" y2="465" stroke="#3E2A1E" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55"/>
    <line x1="810" y1="402" x2="810" y2="465" stroke="#3E2A1E" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55"/>
    <line x1="945" y1="405" x2="945" y2="465" stroke="#3E2A1E" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55"/>

    <!-- AI flow bracket -->
    <text x="810" y="575" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">AI flow</text>
    <path d="M 615 558 Q 615 548 625 548 L 985 548 Q 995 548 995 558" stroke="#3E2A1E" stroke-width="1.5" fill="none" opacity="0.55" filter="url(#wobble-soft)"/>

    <!-- Three tasks in a row, uninterrupted -->
    <rect x="645" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="675" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>
    <line x1="705" y1="485" x2="780" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <rect x="780" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="810" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>
    <line x1="840" y1="485" x2="915" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <rect x="915" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="945" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>

    <text x="810" y="615" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">flow uninterrupted, human watching</text>
  </g>

  <!-- ============ PANEL 3: ESCALATION (the punchline) ============ -->
  <g>
    <text x="1290" y="200" class="h" font-size="64" fill="#3E2A1E" text-anchor="middle">escalation</text>
    <text x="1290" y="245" class="mono" font-size="16" fill="#3E2A1E" text-anchor="middle">human invoked by trigger</text>

    <!-- AI flow bracket -->
    <text x="1230" y="395" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">AI flow</text>
    <path d="M 1095 412 Q 1095 422 1105 422 L 1455 422 Q 1465 422 1465 412" stroke="#3E2A1E" stroke-width="1.5" fill="none" opacity="0.55" filter="url(#wobble-soft)"/>

    <!-- Three tasks uninterrupted -->
    <rect x="1125" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="1155" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>
    <line x1="1185" y1="485" x2="1260" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <rect x="1260" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="1290" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>
    <line x1="1320" y1="485" x2="1395" y2="485" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <rect x="1395" y="465" width="60" height="40" rx="6" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="1425" y="491" class="mono" font-size="12" fill="#3E2A1E" text-anchor="middle">task</text>

    <!-- DEEP-RUST TRIGGER ARROW (the punchline) - fires off middle task, curves down to human -->
    <path d="M 1290 505 Q 1310 560 1340 600" stroke="#A14A2A" stroke-width="3" fill="none" stroke-dasharray="7 5" marker-end="url(#arrow-rust)" filter="url(#wobble)"/>
    <text x="1255" y="565" class="lbl" font-size="20" fill="#A14A2A" font-style="italic">trigger</text>

    <!-- Human-circle off-side, deep-rust border -->
    <circle cx="1360" cy="640" r="42" fill="#E8D6B8" stroke="#A14A2A" stroke-width="2.8" filter="url(#wobble)"/>
    <text x="1360" y="648" class="lbl" font-size="22" fill="#3E2A1E" text-anchor="middle">human</text>

    <text x="1290" y="730" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle" font-style="italic">human only invoked when a trigger fires</text>
  </g>

  <!-- ============ CAPTION STRIP ============ -->
  <text x="800" y="858" class="mono" font-size="15" fill="#3E2A1E" text-anchor="middle">figure 01 · three patterns the term "HITL" gets used for</text>

  <!-- ============ NIB CHARACTER ============ -->
  <g transform="translate(1530, 815)">
    <path d="M 0 28 L -14 8 L -14 -14 Q -14 -22 0 -22 Q 14 -22 14 -14 L 14 8 Z"
          fill="#F5E9D7" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
    <circle cx="0" cy="2" r="2" fill="#3E2A1E"/>
    <line x1="0" y1="4" x2="0" y2="26" stroke="#3E2A1E" stroke-width="1.5"/>
    <circle cx="-5" cy="-10" r="1.8" fill="#3E2A1E"/>
    <circle cx="5" cy="-10" r="1.8" fill="#3E2A1E"/>
  </g>
</svg>
