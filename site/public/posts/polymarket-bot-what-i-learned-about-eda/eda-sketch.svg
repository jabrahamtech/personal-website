<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Polymarket bot event flow sketch</title>
  <desc id="desc">Market updates move through normalization, strategy, execution, and audit logging.</desc>
  <rect width="1200" height="630" fill="#0b0e0c"/>
  <rect x="54" y="54" width="1092" height="522" rx="18" fill="#111711" stroke="#35543a" stroke-width="2"/>
  <text x="90" y="122" fill="#7dff8a" font-family="JetBrains Mono, Menlo, monospace" font-size="30" font-weight="700">polymarket bot - event flow</text>
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#d8eadc">
    <g transform="translate(92 220)">
      <rect width="180" height="100" rx="8" fill="#172117" stroke="#5f8f66"/>
      <text x="26" y="44">market</text>
      <text x="26" y="72" fill="#9bb7a0">updates</text>
    </g>
    <g transform="translate(350 220)">
      <rect width="180" height="100" rx="8" fill="#172117" stroke="#5f8f66"/>
      <text x="24" y="44">normalize</text>
      <text x="24" y="72" fill="#9bb7a0">events</text>
    </g>
    <g transform="translate(608 220)">
      <rect width="180" height="100" rx="8" fill="#172117" stroke="#5f8f66"/>
      <text x="24" y="44">strategy</text>
      <text x="24" y="72" fill="#9bb7a0">decision</text>
    </g>
    <g transform="translate(866 220)">
      <rect width="180" height="100" rx="8" fill="#172117" stroke="#5f8f66"/>
      <text x="24" y="44">execute</text>
      <text x="24" y="72" fill="#9bb7a0">order</text>
    </g>
    <g transform="translate(480 420)">
      <rect width="240" height="92" rx="8" fill="#141814" stroke="#6f5c33"/>
      <text x="32" y="39" fill="#f0c26a">audit log</text>
      <text x="32" y="66" fill="#bda984">replay decisions</text>
    </g>
  </g>
  <g stroke="#7dff8a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M278 270h64"/>
    <path d="M532 270h68"/>
    <path d="M790 270h68"/>
    <path d="M698 324c-20 46-55 76-88 96"/>
    <path d="M936 326c-78 70-154 99-216 122"/>
  </g>
  <g fill="#7dff8a">
    <path d="M342 270l-14-8v16z"/>
    <path d="M600 270l-14-8v16z"/>
    <path d="M858 270l-14-8v16z"/>
  </g>
</svg>
