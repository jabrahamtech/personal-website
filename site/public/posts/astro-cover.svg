<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Workflow diagram: a single .mdx file flows through a Zod-validated frontmatter branch and an MDX body branch, into Astro's static render, fanning out to HTML + TOC, JSON-LD metadata, and RSS / sitemap.">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#070a08"/>
      <stop offset="100%" stop-color="#0b0e0c"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#152017" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#46c463"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <!-- header -->
  <g font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace">
    <text x="60" y="60" font-size="13" fill="#7dff8a" letter-spacing="3">&gt; ./post-pipeline</text>
    <text x="60" y="100" font-size="34" fill="#ecebe4" letter-spacing="-1" font-weight="700">building-this-site-with-astro</text>
    <text x="60" y="128" font-size="14" fill="#8b9286" letter-spacing="1">how a single .mdx file becomes static HTML + JSON-LD + an RSS item — at build time, no client runtime</text>
  </g>

  <!-- diagram -->
  <g font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace">

    <!-- col labels -->
    <g font-size="11" fill="#5a6d5d" letter-spacing="3">
      <text x="180" y="190" text-anchor="middle">SOURCE</text>
      <text x="460" y="190" text-anchor="middle">PARSE</text>
      <text x="750" y="190" text-anchor="middle">RENDER</text>
      <text x="1020" y="190" text-anchor="middle">OUTPUT</text>
    </g>

    <!-- source box -->
    <g>
      <rect x="80" y="246" width="200" height="96" fill="#070a08" stroke="#7dff8a" stroke-width="1"/>
      <rect x="80" y="246" width="200" height="22" fill="#0a0e0b" stroke="#1d2820"/>
      <text x="92" y="261" font-size="11" fill="#9aa39a" letter-spacing="2">FILE</text>
      <text x="265" y="261" font-size="11" fill="#7dff8a" letter-spacing="2" text-anchor="end">[.mdx]</text>
      <text x="92" y="294" font-size="14" fill="#ecebe4">posts/*.mdx</text>
      <text x="92" y="318" font-size="11" fill="#8b9286">— frontmatter</text>
      <text x="92" y="334" font-size="11" fill="#8b9286">— mdx body</text>
    </g>

    <!-- frontmatter branch -->
    <g>
      <rect x="350" y="210" width="220" height="62" fill="#070a08" stroke="#46c463"/>
      <text x="362" y="232" font-size="11" fill="#46c463" letter-spacing="2">[1] FRONTMATTER</text>
      <text x="362" y="251" font-size="13" fill="#cfe9d3">Zod schema</text>
      <text x="362" y="266" font-size="11" fill="#8b9286">build fails on bad fields</text>
    </g>

    <!-- body branch -->
    <g>
      <rect x="350" y="316" width="220" height="62" fill="#070a08" stroke="#46c463"/>
      <text x="362" y="338" font-size="11" fill="#46c463" letter-spacing="2">[2] MDX BODY</text>
      <text x="362" y="357" font-size="13" fill="#cfe9d3">remark + rehype</text>
      <text x="362" y="372" font-size="11" fill="#8b9286">slug, autolink, &lt;CodeBlock /&gt;</text>
    </g>

    <!-- render box -->
    <g>
      <rect x="640" y="246" width="220" height="96" fill="#070a08" stroke="#7dff8a" stroke-width="1.5"/>
      <rect x="640" y="246" width="220" height="22" fill="#0a0e0b" stroke="#1d2820"/>
      <text x="652" y="261" font-size="11" fill="#9aa39a" letter-spacing="2">ASTRO STATIC</text>
      <text x="825" y="261" font-size="11" fill="#7dff8a" letter-spacing="2" text-anchor="end">[no JS]</text>
      <text x="652" y="294" font-size="14" fill="#ecebe4">post.render()</text>
      <text x="652" y="318" font-size="11" fill="#8b9286">→ Content + headings</text>
      <text x="652" y="334" font-size="11" fill="#8b9286">→ DocLayout chrome</text>
    </g>

    <!-- outputs -->
    <g>
      <rect x="920" y="204" width="200" height="60" fill="#070a08" stroke="#2a3a2d"/>
      <text x="932" y="222" font-size="11" fill="#9aa39a" letter-spacing="2">HTML</text>
      <text x="1108" y="222" font-size="11" fill="#46c463" letter-spacing="2" text-anchor="end">.html</text>
      <text x="932" y="240" font-size="13" fill="#cfe9d3">+ TOC, anchor IDs</text>
      <text x="932" y="254" font-size="11" fill="#8b9286">+ inline copy buttons</text>
    </g>
    <g>
      <rect x="920" y="276" width="200" height="60" fill="#070a08" stroke="#2a3a2d"/>
      <text x="932" y="294" font-size="11" fill="#9aa39a" letter-spacing="2">METADATA</text>
      <text x="1108" y="294" font-size="11" fill="#46c463" letter-spacing="2" text-anchor="end">JSON-LD</text>
      <text x="932" y="312" font-size="13" fill="#cfe9d3">Person · BlogPosting</text>
      <text x="932" y="326" font-size="11" fill="#8b9286">og:image · twitter:card</text>
    </g>
    <g>
      <rect x="920" y="348" width="200" height="60" fill="#070a08" stroke="#2a3a2d"/>
      <text x="932" y="366" font-size="11" fill="#9aa39a" letter-spacing="2">FEEDS</text>
      <text x="1108" y="366" font-size="11" fill="#46c463" letter-spacing="2" text-anchor="end">.xml</text>
      <text x="932" y="384" font-size="13" fill="#cfe9d3">RSS 2.0 + XSL view</text>
      <text x="932" y="398" font-size="11" fill="#8b9286">sitemap-index.xml</text>
    </g>

    <!-- connectors (orthogonal, with arrowheads) -->
    <g stroke="#46c463" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
      <!-- source → frontmatter -->
      <path d="M 280 280 H 315 V 240 H 350"/>
      <!-- source → body -->
      <path d="M 280 308 H 315 V 348 H 350"/>
      <!-- frontmatter → render -->
      <path d="M 570 240 H 605 V 280 H 640"/>
      <!-- body → render -->
      <path d="M 570 348 H 605 V 308 H 640"/>
      <!-- render → out1 -->
      <path d="M 860 270 H 890 V 234 H 920"/>
      <!-- render → out2 -->
      <path d="M 860 294 H 920"/>
      <!-- render → out3 -->
      <path d="M 860 320 H 890 V 378 H 920"/>
    </g>

    <!-- subtle 'merge' pin between parse and render -->
    <circle cx="605" cy="294" r="3" fill="#7dff8a"/>
    <circle cx="890" cy="294" r="3" fill="#7dff8a"/>
  </g>

  <!-- footer status row -->
  <g font-family="ui-monospace, Menlo, Consolas, 'JetBrains Mono', monospace" font-size="12">
    <text x="60" y="600" fill="#5a6d5d" letter-spacing="2">▸ static-rendered  ·  ▸ no client runtime by default  ·  ▸ ships only the JS each page asks for</text>
    <text x="1140" y="600" fill="#7dff8a" letter-spacing="2" text-anchor="end">jabrahamtech.com →</text>
  </g>
</svg>
