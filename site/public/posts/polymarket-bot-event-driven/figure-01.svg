<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <filter id="wobble" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="53" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
    </filter>
    <filter id="wobble-soft" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="61" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
    </filter>
    <marker id="arrow-ink" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#3E2A1E"/>
    </marker>
    <marker id="arrow-rust" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#A14A2A"/>
    </marker>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .h    { font-family: 'Caveat', cursive; font-weight: 600; }
      .lbl  { font-family: 'Caveat', cursive; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
    </style>
  </defs>

  <!-- Cream paper -->
  <rect width="1600" height="900" fill="#F5E9D7"/>

  <!-- Notebook ruled lines -->
  <g stroke="#D4A14A" stroke-width="1" opacity="0.16">
    <line x1="0" y1="28"  x2="1600" y2="28"/><line x1="0" y1="56"  x2="1600" y2="56"/>
    <line x1="0" y1="84"  x2="1600" y2="84"/><line x1="0" y1="112" x2="1600" y2="112"/>
    <line x1="0" y1="140" x2="1600" y2="140"/><line x1="0" y1="168" x2="1600" y2="168"/>
    <line x1="0" y1="196" x2="1600" y2="196"/><line x1="0" y1="224" x2="1600" y2="224"/>
    <line x1="0" y1="252" x2="1600" y2="252"/><line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="308" x2="1600" y2="308"/><line x1="0" y1="336" x2="1600" y2="336"/>
    <line x1="0" y1="364" x2="1600" y2="364"/><line x1="0" y1="392" x2="1600" y2="392"/>
    <line x1="0" y1="420" x2="1600" y2="420"/><line x1="0" y1="448" x2="1600" y2="448"/>
    <line x1="0" y1="476" x2="1600" y2="476"/><line x1="0" y1="504" x2="1600" y2="504"/>
    <line x1="0" y1="532" x2="1600" y2="532"/><line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="588" x2="1600" y2="588"/><line x1="0" y1="616" x2="1600" y2="616"/>
    <line x1="0" y1="644" x2="1600" y2="644"/><line x1="0" y1="672" x2="1600" y2="672"/>
    <line x1="0" y1="700" x2="1600" y2="700"/><line x1="0" y1="728" x2="1600" y2="728"/>
    <line x1="0" y1="756" x2="1600" y2="756"/><line x1="0" y1="784" x2="1600" y2="784"/>
    <line x1="0" y1="812" x2="1600" y2="812"/><line x1="0" y1="840" x2="1600" y2="840"/>
    <line x1="0" y1="868" x2="1600" y2="868"/>
  </g>

  <!-- Vertical margin line -->
  <line x1="80" y1="0" x2="80" y2="900" stroke="#A14A2A" stroke-width="1.5" opacity="0.45"/>

  <!-- TITLE -->
  <text x="135" y="118" class="h" font-size="46" fill="#3E2A1E">the three-layer shape of the bot</text>
  <text x="135" y="156" class="mono" font-size="16" fill="#3E2A1E" opacity="0.7">bus for facts, synchronous calls for decisions, log for memory</text>

  <!-- Panel dividers -->
  <line x1="570" y1="200" x2="570" y2="780" stroke="#3E2A1E" stroke-width="1" opacity="0.28" filter="url(#wobble-soft)"/>
  <line x1="1050" y1="200" x2="1050" y2="780" stroke="#3E2A1E" stroke-width="1" opacity="0.28" filter="url(#wobble-soft)"/>

  <!-- ============ PANEL 1: FACTS (async bus) ============ -->
  <g>
    <text x="330" y="245" class="h" font-size="48" fill="#3E2A1E" text-anchor="middle">facts</text>
    <text x="330" y="278" class="mono" font-size="14" fill="#3E2A1E" text-anchor="middle">async, coalesced, multi-consumer</text>

    <!-- Feeds box (input) -->
    <rect x="135" y="340" width="120" height="70" rx="8" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="195" y="378" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle">feeds</text>
    <text x="195" y="398" class="mono" font-size="10" fill="#3E2A1E" text-anchor="middle" opacity="0.65">market + user</text>

    <!-- Bus pipe (wide rounded rect) -->
    <rect x="135" y="445" width="385" height="68" rx="14" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="327" y="475" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle">MessageBus</text>
    <text x="327" y="498" class="mono" font-size="10" fill="#3E2A1E" text-anchor="middle" opacity="0.65">book_update · orders · fills · IntervalBoundary</text>

    <!-- Arrow feeds -> bus -->
    <line x1="195" y1="412" x2="195" y2="443" stroke="#3E2A1E" stroke-width="2.5" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>

    <!-- Consumers (multi) -->
    <rect x="320" y="555" width="200" height="50" rx="6" fill="#E8D6B8" stroke="#7A8450" stroke-width="2.2" filter="url(#wobble)"/>
    <text x="420" y="586" class="lbl" font-size="16" fill="#3E2A1E" text-anchor="middle">cache · strategy · recorder</text>

    <!-- Arrow bus -> consumers -->
    <line x1="420" y1="515" x2="420" y2="553" stroke="#3E2A1E" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.7" marker-end="url(#arrow-ink)"/>
    <text x="445" y="540" class="mono" font-size="11" fill="#3E2A1E" opacity="0.7">subscribe</text>

    <!-- Inline note -->
    <text x="330" y="695" class="lbl" font-size="19" fill="#3E2A1E" text-anchor="middle" font-style="italic">stale messages get dropped.</text>
    <text x="330" y="722" class="lbl" font-size="19" fill="#3E2A1E" text-anchor="middle" font-style="italic">only the latest book matters.</text>
  </g>

  <!-- ============ PANEL 2: DECISIONS (synchronous hot path — PUNCHLINE) ============ -->
  <g>
    <text x="810" y="245" class="h" font-size="48" fill="#3E2A1E" text-anchor="middle">decisions</text>
    <text x="810" y="278" class="mono" font-size="14" fill="#3E2A1E" text-anchor="middle">synchronous, single-writer, deterministic</text>

    <!-- Deep-rust accent line under the header (punchline mark) -->
    <path d="M 660 292 Q 810 298 960 290" stroke="#A14A2A" stroke-width="3" fill="none" opacity="0.85" filter="url(#wobble-soft)"/>

    <!-- Strategy input (top) -->
    <rect x="720" y="335" width="180" height="60" rx="8" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2.5" filter="url(#wobble)"/>
    <text x="810" y="368" class="lbl" font-size="20" fill="#3E2A1E" text-anchor="middle">strategy</text>
    <text x="810" y="386" class="mono" font-size="10" fill="#3E2A1E" text-anchor="middle" opacity="0.65">publishes "orders" command</text>

    <!-- Arrow down (order command into the hot path) -->
    <line x1="810" y1="397" x2="810" y2="430" stroke="#3E2A1E" stroke-width="3" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>

    <!-- Executor box (DEEP-RUST FILLED — the punchline element) -->
    <rect x="650" y="435" width="320" height="160" rx="10" fill="#A14A2A" stroke="#3E2A1E" stroke-width="2.8" filter="url(#wobble)"/>
    <text x="810" y="475" class="lbl" font-size="24" fill="#F5E9D7" text-anchor="middle">execution engine</text>

    <!-- Internal sync flow inside the executor (in cream text on rust) -->
    <text x="810" y="510" class="mono" font-size="12" fill="#F5E9D7" text-anchor="middle" opacity="0.95">risk check  →  backend submit  →  fill</text>
    <text x="810" y="535" class="mono" font-size="11" fill="#F5E9D7" text-anchor="middle" opacity="0.85">in-process, blocking, single order at a time</text>

    <!-- Small "sync" label on the side -->
    <text x="810" y="572" class="lbl" font-size="18" fill="#F5E9D7" text-anchor="middle" font-style="italic">no topic. no await.</text>

    <!-- Inline note -->
    <text x="810" y="700" class="lbl" font-size="19" fill="#3E2A1E" text-anchor="middle" font-style="italic">three of the most consequential moves</text>
    <text x="810" y="724" class="lbl" font-size="19" fill="#3E2A1E" text-anchor="middle" font-style="italic">are deliberately synchronous.</text>
  </g>

  <!-- ============ PANEL 3: MEMORY (append-only log) ============ -->
  <g>
    <text x="1290" y="245" class="h" font-size="48" fill="#3E2A1E" text-anchor="middle">memory</text>
    <text x="1290" y="278" class="mono" font-size="14" fill="#3E2A1E" text-anchor="middle">separate sink, immutable, queryable later</text>

    <!-- Event log shape: stacked rectangles -->
    <g transform="translate(1170, 360)">
      <rect x="0" y="0"   width="240" height="22" rx="3" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
      <rect x="0" y="28"  width="240" height="22" rx="3" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
      <rect x="0" y="56"  width="240" height="22" rx="3" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
      <rect x="0" y="84"  width="240" height="22" rx="3" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
      <rect x="0" y="112" width="240" height="22" rx="3" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
      <rect x="0" y="140" width="240" height="22" rx="3" fill="#E8D6B8" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
    </g>
    <text x="1290" y="546" class="lbl" font-size="18" fill="#3E2A1E" text-anchor="middle">event log (SQLite)</text>

    <!-- Arrow crossing the panel boundary from executor -> event log -->
    <path d="M 985 515 Q 1080 545 1170 460" stroke="#3E2A1E" stroke-width="2.5" fill="none" marker-end="url(#arrow-ink)" filter="url(#wobble)"/>
    <text x="1085" y="585" class="mono" font-size="11" fill="#3E2A1E" opacity="0.8" text-anchor="middle">direct write, bypasses bus</text>

    <!-- Inline note -->
    <text x="1290" y="695" class="lbl" font-size="19" fill="#3E2A1E" text-anchor="middle" font-style="italic">the log is not the bus.</text>
    <text x="1290" y="722" class="lbl" font-size="19" fill="#3E2A1E" text-anchor="middle" font-style="italic">conflating them is the bug.</text>
  </g>

  <!-- ============ CAPTION STRIP ============ -->
  <text x="800" y="858" class="mono" font-size="15" fill="#3E2A1E" text-anchor="middle">figure 01 · the bot's hybrid shape: bus for facts, sync for decisions, log for memory</text>

  <!-- ============ NIB CHARACTER (lower right) ============ -->
  <g transform="translate(1530, 815)">
    <path d="M 0 28 L -14 8 L -14 -14 Q -14 -22 0 -22 Q 14 -22 14 -14 L 14 8 Z"
          fill="#F5E9D7" stroke="#3E2A1E" stroke-width="2" filter="url(#wobble-soft)"/>
    <circle cx="0" cy="2" r="2" fill="#3E2A1E"/>
    <line x1="0" y1="4" x2="0" y2="26" stroke="#3E2A1E" stroke-width="1.5"/>
    <circle cx="-5" cy="-10" r="1.8" fill="#3E2A1E"/>
    <circle cx="5" cy="-10" r="1.8" fill="#3E2A1E"/>
  </g>
</svg>
